        fill="none"
        stroke="#ffffff"
        stroke-width="2.4"
        stroke-linejoin="round"
      />
      <g stroke="#7BAFD4" stroke-width="2.2" stroke-linecap="round">
        <line x1="40" y1="40" x2="40" y2="20" />
        <line x1="40" y1="40" x2="58" y2="50" />
        <line x1="40" y1="40" x2="22" y2="50" />
      </g>
      <circle cx="40" cy="40" r="6" fill="#2EC5CE" />
      <circle cx="40" cy="20" r="3.4" fill="#7BAFD4" />
      <circle cx="58" cy="50" r="3.4" fill="#7BAFD4" />
      <circle cx="22" cy="50" r="3.4" fill="#7BAFD4" />
