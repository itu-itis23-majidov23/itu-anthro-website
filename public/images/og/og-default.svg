<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="İTÜ AnthRo — Anthropomorphic Robotics">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002855" />
      <stop offset="55%" stop-color="#00336b" />
      <stop offset="100%" stop-color="#003a78" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#7BAFD4" stroke-opacity="0.10" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <circle cx="1050" cy="120" r="240" fill="#7BAFD4" fill-opacity="0.12" />

  <g transform="translate(96 232)">
    <g transform="translate(0 0)">
      <path
